<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Embed Blancpain (v3)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      height: 100%;
      overflow: hidden; /* evita scrollbar del propio embed */
    }
    .frame {
      width: 100%;
      border: 0;
      outline: 0;
      display: block;
      background: #fff;
      height: 100vh; /* fallback inmediato */
      min-height: 100vh;
      overflow: hidden;
    }
    .fallback {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
      padding: 16px;
      color: #111;
      background: #fff;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111;
      font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="bpLoading" class="loading">Cargando…</div>
  <noscript class="fallback">Esta pieza requiere JavaScript para ajustarse en altura.</noscript>
  <iframe
    id="bpFrame"
    class="frame"
    title="Blancpain - Landing"
    src="https://brandedcontentgrupogodo.github.io/ext2026/blancpain/04-2026/index3.html"
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
    allow="autoplay; fullscreen"
    scrolling="no"
  ></iframe>

  <script>
    (function () {
      var frame = document.getElementById('bpFrame');
      var loading = document.getElementById('bpLoading');

      frame.addEventListener('load', function () {
        if (loading) loading.style.display = 'none';
      });

      function onMessage(event) {
        if (!event || !event.data || event.data.type !== 'bp-iframe-height') return;
        var h = Number(event.data.height);
        if (!Number.isFinite(h) || h < 100) return;
        frame.style.height = (h + 2) + 'px';
        // Si ya recibimos altura, podemos ocultar el loader aunque el load tarde.
        if (loading) loading.style.display = 'none';
      }
      window.addEventListener('message', onMessage);
    })();
  </script>
</body>
</html>
